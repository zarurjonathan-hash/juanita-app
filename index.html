    </div>
    <div class="acciones-finales">
      <button class="btn-secundario" onclick="cerrarModal()">Cancelar</button>
      <button class="btn-success" id="nc-guar">Guardar</button>
    </div>`;
  document.getElementById('modal-overlay').classList.add('visible');
  document.getElementById('nc-guar').addEventListener('click', async () => {
    const nombre = document.getElementById('nc-nombre').value.trim();
    if (!nombre) { alert('Nombre obligatorio'); return; }
    try {
      const { data, error } = await supa.from('clientes').insert({ nombre, telefono: document.getElementById('nc-tel').value, email: document.getElementById('nc-email').value }).select().single();
      if (error) throw error;
      formState.clientes.push({ id: data.id, nombre: data.nombre });
      formState.clientes.sort((a,b)=>a.nombre.localeCompare(b.nombre));
      cerrarModal();
      renderFormPedido();
      setTimeout(() => { const s=document.getElementById('f-cli'); if(s) s.value=data.id; recalcular(); }, 50);
    } catch(e) { alert('Error: '+e.message); }
  });
}

async function enviarPedido() {
  if (formState.guardando) return;
  const tipo = formState.tipo;
  const cliente_id = document.getElementById('f-cli')?.value;
  const vendedor_id = document.getElementById('f-ven')?.value;
  const fecha = document.getElementById('f-fecha')?.value;
  const errores = [];
  if (!cliente_id) errores.push('f-cli');
  if (!vendedor_id) errores.push('f-ven');
  if (!fecha) errores.push('f-fecha');

  const tela_tipo = document.getElementById('f-tela-tipo')?.value?.trim() || '';
  const tela_ancho = parseFloat(document.getElementById('f-tela-ancho')?.value)||null;
  const cantidad = parseFloat(document.getElementById('f-cantidad')?.value)||0;
  const unidad = document.querySelector('input[name="unidad_medida"]:checked')?.value || null;
  const lado = document.querySelector('input[name="lado_sublimacion"]:checked')?.value || null;
  const propia = document.querySelector('input[name="tela_propia"]:checked')?.value === 'true';
  const precio_tela = parseFloat(document.getElementById('f-precio-tela')?.value)||0;
  const precio_sub = parseFloat(document.getElementById('f-precio-sub')?.value)||0;
  const obs = document.getElementById('f-obs')?.value||'';

  if (['SUB','PTS'].includes(tipo)) {
    if (!tela_tipo) errores.push('f-tela-tipo');
    if (!formState.disenos.length) { alert('Agrega al menos un diseño'); return; }
  }
  if (['VT'].includes(tipo) && !tela_tipo) errores.push('f-tela-tipo');

  document.querySelectorAll('.form-grupo.error').forEach(g=>g.classList.remove('error'));
  if (errores.length) {
    errores.forEach(id => document.getElementById(id)?.closest('.form-grupo')?.classList.add('error'));
    alert('Faltan campos obligatorios (marcados en rojo)'); return;
  }

  formState.guardando = true;
  const btn = document.getElementById('btn-enviar-ped');
  if (btn) { btn.disabled=true; btn.innerHTML='<span class="spinner" style="border-color:rgba(255,255,255,.4);border-top-color:#fff;vertical-align:middle;"></span> Guardando...'; }

  try {
    const { count } = await supa.from('pedidos').select('*',{count:'exact',head:true});
    const consec = (count||0)+1;
    const folio = 'IJ-' + tipo + '-' + String(consec).padStart(4,'0');
    const totalM = formState.disenos.reduce((a,d)=>a+(parseFloat(d.metros)||0),0);
    const base = totalM||cantidad;
    const precio_total = ['SUB','PTS'].includes(tipo) ? (base*precio_sub + (propia?base*precio_tela:0)) :
                         tipo==='VT' ? cantidad*(parseFloat(document.getElementById('f-precio-vt')?.value)||0) :
                         tipo==='PI' ? cantidad*(parseFloat(document.getElementById('f-precio-pi')?.value)||0) :
                         tipo==='MUE' && document.querySelector('input[name="mue_costo"]:checked')?.value==='si' ? parseFloat(document.getElementById('f-mue-precio')?.value)||0 : 0;

    const { data: ped, error: pe } = await supa.from('pedidos').insert({
      folio, tipo, cliente_id, vendedor_id,
      etapa_actual: 'Captura', estado: 'pendiente', prioridad: 3,
      fecha_captura: new Date().toISOString().slice(0,10),
      fecha_comprometida: fecha,
      precio_tela, precio_sublimado: precio_sub, precio_total,
      tela_tipo: tela_tipo||null, tela_propia: propia, tela_ancho,
      unidad_medida: unidad, lado_sublimacion: lado, observaciones: obs,
    }).select().single();
    if (pe) throw pe;

    if (formState.disenos.length && ['SUB','PTS','MUE'].includes(tipo)) {
      const filasDis = formState.disenos.map((d,i) => ({ pedido_id:ped.id, imagen_url:d.imagen_url||null, metros_solicitados:parseFloat(d.metros)||0, orden:i+1 }));
      const { data: dIns } = await supa.from('pedido_disenos').insert(filasDis).select();
      if (tipo==='PTS' && dIns) {
        const filasTal = [];
        formState.disenos.forEach((d,i) => {
          Object.entries(d.tallas).forEach(([talla,cant]) => {
            if (parseInt(cant)>0) filasTal.push({ pedido_id:ped.id, diseno_id:dIns[i]?.id, talla, cantidad:parseInt(cant) });
          });
        });
        if (filasTal.length) await supa.from('pedido_tallas_v2').insert(filasTal).catch(()=>{});
      }
    }

    await supa.from('notificaciones').insert({ tipo:'pedido_nuevo', mensaje:`Nuevo pedido ${folio} requiere aprobación` }).catch(()=>{});
    mostrarToast(`✅ Pedido ${folio} creado. Esperando aprobación.`);
    cambiarModulo('todos-pedidos');
  } catch(e) {
    alert('Error al guardar: ' + (e.message||e));
  } finally {
    formState.guardando = false;
    if (btn) { btn.disabled=false; btn.textContent='Enviar pedido'; }
  }
}

/* ============================================
   IMPRIMIR HOJA VIAJERA
   ============================================ */
async function imprimirHojaViajera(pedidoId) {
  let pedido=null, disenos=[], tallas=[], etapas=[], rollos=[];
  try { const {data}=await supa.from('pedidos').select('*').eq('id',pedidoId).single(); pedido=data; } catch(e) { alert('Error cargando pedido'); return; }
  try { const {data}=await supa.from('pedido_disenos').select('*').eq('pedido_id',pedidoId).order('orden'); disenos=data||[]; } catch(e) {}
  try { const {data}=await supa.from('pedido_tallas_v2').select('*').eq('pedido_id',pedidoId); tallas=data||[]; } catch(e) {}
  try { const {data}=await supa.from('etapas_pedido').select('*').eq('pedido_id',pedidoId).order('completado_en'); etapas=data||[]; } catch(e) {}
  try { const {data}=await supa.from('packing_list_rollos').select('*').eq('pedido_id',pedidoId).order('numero_rollo'); rollos=data||[]; } catch(e) {}
  if (!estado.clientes.length) { try { const {data}=await supa.from('clientes').select('id,nombre'); estado.clientes=data||[]; } catch(e){} }
  const cli = estado.clientes.find(c=>c.id===pedido.cliente_id);
  const totalM = disenos.reduce((a,d)=>a+(parseFloat(d.metros_solicitados)||0),0);
  const totalReal = rollos.reduce((a,r)=>a+(parseFloat(r.metros_reales)||0),0);

  const w = window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><title>Hoja Viajera ${pedido.folio}</title>
  <style>
    body{font-family:Arial,sans-serif;font-size:12px;color:#111;margin:0;padding:20px;}
    h1{font-size:18px;margin:0 0 4px 0;}
    .header{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid #111;padding-bottom:10px;margin-bottom:12px;}
    .logo{font-size:22px;font-weight:900;color:#6366F1;}
    .folio{font-size:24px;font-weight:900;color:#6366F1;}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
    .campo{margin-bottom:6px;}<br>.campo label{font-size:10px;text-transform:uppercase;color:#888;display:block;}
    .campo .val{font-weight:600;}
    table{width:100%;border-collapse:collapse;margin-bottom:12px;font-size:11px;}
    th{background:#f0f0f0;padding:6px 8px;text-align:left;border:1px solid #ddd;}
    td{padding:5px 8px;border:1px solid #ddd;}
    .seccion{margin-bottom:14px;}
    h3{font-size:13px;background:#EEF2FF;padding:6px 10px;margin:0 0 8px 0;color:#4338CA;}
    .etapa-comp{border-left:3px solid #10B981;padding:6px 10px;margin-bottom:6px;background:#F0FDF4;}
    .firma-area{margin-top:30px;display:flex;gap:40px;}
    .firma-linea{flex:1;border-top:1px solid #111;padding-top:4px;font-size:10px;color:#888;}
    @media print{body{padding:10px;}}
  </style></head><body>
  <div class="header">
    <div><div class="logo">IJ — Importaciones Juanita</div><div style="font-size:10px;color:#888;">Hoja Viajera de Producción</div></div>
    <div style="text-align:right;"><div class="folio">${pedido.folio}</div><div style="font-size:11px;">Tipo: ${pedido.tipo} | ${new Date().toLocaleDateString('es-MX')}</div></div>
  </div>
  <div class="grid2">
    <div>
      <div class="campo"><label>Cliente</label><div class="val">${cli?.nombre||'—'}</div></div>
      <div class="campo"><label>Tipo de tela</label><div class="val">${pedido.tela_tipo||'—'} · ${pedido.tela_ancho||'—'} cm</div></div>
      <div class="campo"><label>Lado sublimación</label><div class="val">${pedido.lado_sublimacion||'—'}</div></div>
    </div>
    <div>
      <div class="campo"><label>Fecha comprometida</label><div class="val">${formatearFechaCorta(pedido.fecha_comprometida)}</div></div>
      <div class="campo"><label>Estado</label><div class="val">${pedido.estado}</div></div>
      <div class="campo"><label>Etapa actual</label><div class="val">${pedido.etapa_actual||'—'}</div></div>
    </div>
  </div>
  <div class="seccion"><h3>📦 Packing List</h3>
    <div style="margin-bottom:8px;"><strong>Metros solicitados: ${totalM} m</strong> | <strong>Metros reales: ${totalReal} m</strong></div>
    <table><thead><tr><th>#</th><th>Diseño</th><th>Metros solicitados</th>${pedido.tipo==='PTS'?'<th>Tallas</th>':''}</tr></thead><tbody>
    ${disenos.map((d,i)=>{
      const tDis=tallas.filter(t=>t.diseno_id===d.id);
      return `<tr><td>${i+1}</td><td>Diseño #${i+1}</td><td>${d.metros_solicitados||0} m</td>${pedido.tipo==='PTS'?`<td style="font-size:10px;">${tDis.map(t=>`${t.talla}:${t.cantidad}`).join(' | ')}</td>`:''}</tr>`;
    }).join('')}
    <tr style="background:#EEF2FF;font-weight:700;"><td colspan="${pedido.tipo==='PTS'?3:2}">TOTAL</td><td>${totalM} m</td></tr>
    </tbody></table>
    ${rollos.length?`<table><thead><tr><th>Rollo</th><th>Metros reales</th><th>Ancho cm</th><th>Lote</th></tr></thead><tbody>
    ${rollos.map(r=>`<tr><td>${r.numero_rollo}</td><td>${r.metros_reales} m</td><td>${r.ancho_cm}</td><td>${r.lote_entrada||'—'}</td></tr>`).join('')}
    </tbody></table>`:''}
  </div>
  ${etapas.length?`<div class="seccion"><h3>📋 Historial de Etapas</h3>
    ${etapas.map(et=>{
      const datos=et.datos_json||{};
      return `<div class="etapa-comp"><strong>✅ ${et.etapa}</strong> — ${new Date(et.completado_en).toLocaleDateString('es-MX')}
      ${Object.keys(datos).length?'<br><span style="font-size:10px;color:#555;">'+Object.entries(datos).map(([k,v])=>`${k}: ${v}`).join(' · ')+'</span>':''}
      </div>`;
    }).join('')}</div>`:''}
  ${pedido.observaciones?`<div class="seccion"><h3>📝 Observaciones</h3><p>${escapar(pedido.observaciones)}</p></div>`:''}
  <div class="firma-area">
    <div class="firma-linea">Entregué conforme</div>
    <div class="firma-linea">Recibí conforme</div>
    <div class="firma-linea">Autorizado por</div>
  </div>
  </body></html>`);
  w.document.close();
  setTimeout(() => w.print(), 500);
}

/* ============================================
   INIT
   ============================================ */
function init() {
  document.getElementById('form-login').addEventListener('submit', manejarLogin);
  document.getElementById('btn-ojo').addEventListener('click', () => {
    const inp = document.getElementById('password-login');
    inp.type = inp.type==='password'?'text':'password';
  });
  document.getElementById('avatar-usuario').addEventListener('click', e => {
    e.stopPropagation();
    document.getElementById('dropdown-usuario').classList.toggle('visible');
  });
  document.addEventListener('click', () => document.getElementById('dropdown-usuario').classList.remove('visible'));
  document.getElementById('btn-cerrar-sesion').addEventListener('click', cerrarSesion);
  document.getElementById('modal-cerrar').addEventListener('click', cerrarModal);
  document.getElementById('modal-overlay').addEventListener('click', e => { if(e.target.id==='modal-overlay') cerrarModal(); });
  document.getElementById('panel-cerrar').addEventListener('click', cerrarPanel);
  document.getElementById('panel-overlay').addEventListener('click', cerrarPanel);
  document.getElementById('btn-menu-toggle').addEventListener('click', e => {
    e.stopPropagation();
    document.getElementById('sidebar').classList.toggle('abierto');
  });
  const guardada = localStorage.getItem('ij_sesion');
  if (guardada) {
    try { estado.usuario = JSON.parse(guardada); iniciarApp(); }
    catch(e) { localStorage.removeItem('ij_sesion'); }
  }
}

document.addEventListener('DOMContentLoaded', init);
